        .micro-tag { @apply px-2 py-1.5 rounded text-[10px] font-bold text-white mb-1 cursor-pointer hover:opacity-90 transition-opacity text-center shadow-sm w-full block border border-white/20; }

        #nuvem-status { position: fixed; top: 0; left: 0; right: 0; background: #10b981; color: white; text-align: center; padding: 6px; font-size: 12px; font-weight: bold; z-index: 99999; display: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ====== TEMA MODO DARK SEGURO ====== */
        body.dark-theme { background-color: #0f172a; color: #f8fafc; }
        .dark-theme .bg-white { background-color: #1e293b !important; border-color: #334155 !important; color: #f8fafc !important; }
        .dark-theme .bg-slate-50, .dark-theme .bg-slate-100 { background-color: #0f172a !important; border-color: #1e293b !important; color: #cbd5e1 !important; }
        .dark-theme .text-slate-800, .dark-theme .text-slate-700 { color: #f8fafc !important; }
        .dark-theme .text-slate-500, .dark-theme .text-slate-400 { color: #94a3b8 !important; }
        .dark-theme input, .dark-theme select, .dark-theme textarea { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
        .dark-theme .border-slate-200, .dark-theme .border-slate-100 { border-color: #334155 !important; }
        .dark-theme .grass-pattern { background-color: #15803d !important; } 
        .dark-theme .bg-green-50, .dark-theme .bg-red-50, .dark-theme .bg-yellow-50, .dark-theme .bg-blue-50 { background-color: #1e293b !important; }

        /* ====== TELA DE LOGIN SAAS ====== */
        .login-bg { background-color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; position: fixed; z-index: 100000; left: 0; top: 0;}
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; margin: 20px;}
        .login-title { color: #1e3a8a; font-size: 28px; font-weight: 900; margin-bottom: 5px; }
        .login-subtitle { color: #64748b; font-size: 12px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .login-input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 15px; font-size: 14px; outline: none; background: #f8fafc; color: #334155;}
        .login-input:focus { border-color: #1e3a8a; box-shadow: 0 0 0 2px rgba(30,58,138,0.2); }
        .btn-primary { width: 100%; background: #1e3a8a; color: white; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
        .btn-primary:hover { background: #1e40af; }
        .btn-danger { width: 100%; background: #ef4444; color: white; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}

        @media print { 
            .no-print { display: none !important; }

            .page-break { page-break-inside: avoid; }
            #root { height: auto; overflow: visible; }
            ::-webkit-scrollbar { display: none; }
        }
    </style>
</head>

        const firebaseConfig = {

        // --- SISTEMA DE SINCRONIZAÇÃO DINÂMICO (SAAS) ---
        let activeDocRef = null;
        let globalData = {};
        let saveTimeout = null;
        let isFetchingFromCloud = true;

        function triggerCloudSave() {
            if (isFetchingFromCloud || !activeDocRef) return; 
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const dataToSave = { ...globalData };
                dataToSave.lastUpdated = firebase.database.ServerValue.TIMESTAMP;
                
                activeDocRef.set(dataToSave)
                    .then(() => {
                        const status = document.getElementById('nuvem-status');
                        if(status) {
                            status.style.display = 'block';
                            status.style.backgroundColor = '#10b981'; 
                            status.innerHTML = '☁️ Salvo na Nuvem';
                            setTimeout(() => status.style.display = 'none', 2000);
                        }
                    })
                    .catch(e => console.error("Erro ao salvar na nuvem:", e));
            }, 1500); 
        }

        const useSafeStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    const val = item ? JSON.parse(item) : initialValue;
                    globalData[key] = val;
                    return val;
                } catch (error) { return initialValue; }
            });

            useEffect(() => {
                globalData[key] = storedValue;
                try { window.localStorage.setItem(key, JSON.stringify(storedValue)); } catch (error) {}
                triggerCloudSave();
            }, [key, storedValue]);

            return [storedValue, setStoredValue];
        };

        const formatDateBR = (dateString) => { if(!dateString) return '-'; const [y, m, d] = dateString.split('-'); return `${d}/${m}`; };
        const getMonday = (d) => { d = new Date(d); var day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1); return new Date(d.setDate(diff)); }

        // --- CONSTANTES ---

        const locations = ["CT", "Estádio", "Hotel", "Academia", "Viagem", "Concentração"];

        const StarRating = ({ value, onChange, readOnly=false }) => (

        );

        // --- COMPONENTES AUXILIARES ---
        const OscillationChart = ({ sessions, color }) => {
            if(!sessions || sessions.length < 2) return <div className="h-32 flex items-center justify-center text-xs text-slate-400">Dados insuficientes.</div>;
            const h = 100, w = 250, pad = 20; const pts = sessions.slice(-10).map((s, i, arr) => { const x = pad + (i / (arr.length - 1)) * (w - 2*pad); const y = h - pad - ((s.rating / 5) * (h - 2*pad)); return `${x},${y}`; }).join(' ');
            return (<svg viewBox={`0 0 ${w} ${h}`} className="w-full h-32 bg-slate-50 rounded border border-slate-100"><polyline points={pts} fill="none" stroke={color} strokeWidth="2" />{sessions.slice(-10).map((s, i, arr) => { const x = pad + (i / (arr.length - 1)) * (w - 2*pad); const y = h - pad - ((s.rating / 5) * (h - 2*pad)); return <circle key={i} cx={x} cy={y} r="3" fill={color} />; })}</svg>);
        };

        const PositionalBarChart = ({ players, color }) => {

            const maxRating = 5;
            return (

iv></div>)) : <span className="text-xs text-slate-400 italic">Sem dados.</span>}</div> </div> </div> </div> );

            const playerHistory = useMemo(() => {
                if(!history) return [];
                return Object.keys(history).map(date => ({ date, rating: (history[date].ratings && history[date].ratings[playerIndex]) || 0 })).filter(x => x.rating > 0).sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [history, playerIndex]);

            return ( 
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print" onClick={onClose}> 
                    <div className="bg-white rounded-2xl w-full max-w-sm overflow-hidden" onClick={e=>e.stopPropagation()}> 
                        <div className="p-4 text-white flex justify-between items-center" style={{background: themeColor === '#FFFFFF' ? '#0f172a' : themeColor}}>
                            <h3 className="font-bold uppercase">{player.name || '?'}</h3>
                            <button onClick={onClose}><Icon name="x"/></button>
                        </div> 
                        <div className="p-6 space-y-4 max-h-[80vh] overflow-y-auto"> 
                            <div className="flex justify-center">
                                <div className="w-24 h-24 rounded-full bg-slate-200 overflow-hidden border-4 border-slate-100 shadow">
                                    {player.image?<img src={player.image} className="w-full h-full object-cover"/>:<Icon name="users"/>}
                                </div>
                            </div> 
                            
                            <div className="bg-slate-50 p-2 rounded border border-slate-200">
                                <label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Link da Imagem (Nuvem)</label>
                                <input className="w-full border rounded p-2 text-xs text-blue-500 bg-white" placeholder="https://..." value={player.image||''} onChange={e=>onUpdate('image',e.target.value)}/>
                            </div>

                            <div className="bg-slate-50 p-2 rounded border border-slate-200">
                                <label className="text-[10px] font-bold text-slate-400 uppercase mb-2 block text-center">Evolução e Notas</label>
                                <OscillationChart sessions={[...playerHistory].reverse()} color={themeColor === '#FFFFFF' ? '#0f172a' : themeColor} />
                            </div>

                            <div className="flex gap-2">
                                <button onClick={()=>onUpdate('injured', !player.injured)} className={`flex-1 py-2 rounded-lg font-bold text-white text-xs ${player.injured?'bg-red-500':'bg-green-500'}`}>{player.injured?'NO DM':'APTO'}</button>
                                <button onClick={()=>onUpdate('suspended', !player.suspended)} className={`flex-1 py-2 rounded-lg font-bold text-white text-xs ${player.suspended?'bg-yellow-500':'bg-slate-300'}`}>{player.suspended?'SUSPENSO':'OK'}</button>
                            </div> 
                            
                            <div className="grid grid-cols-4 gap-2">
                                <div><label className="glass-label text-slate-500">Idade</label><input type="number" className="w-full border-b text-center" value={player.age||''} onChange={e=>onUpdate('age',e.target.value)}/></div>
                                <div><label className="glass-label text-slate-500">Altura</label><input type="number" className="w-full border-b text-center" value={player.height||''} onChange={e=>onUpdate('height',e.target.value)}/></div>
                                <div><label className="glass-label text-slate-500">Peso</label><input type="number" className="w-full border-b text-center" value={player.weight||''} onChange={e=>onUpdate('weight',e.target.value)}/></div>
                                <div><label className="glass-label text-slate-500">Perna</label><select className="w-full border-b bg-white text-[10px]" value={player.foot||'Destro'} onChange={e=>onUpdate('foot',e.target.value)}><option>Destro</option><option>Canhoto</option><option>Ambidestro</option></select></div>
                            </div> 
                            
                            <div>
                                <label className="glass-label text-slate-500">Posição</label>
                                <select className="w-full border-b bg-white" value={player.pos || ''} onChange={e=>onUpdate('pos',e.target.value)}>
                                    <option value="">-</option>{positions.map(p=><option key={p} value={p}>{p}</option>)}
                                </select>
                            </div> 
                        </div> 
                    </div> 
                </div> 
            );
        };

        const App = () => {
            const [auth, setAuth] = useState(() => localStorage.getItem('pc_auth') === 'true');
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [err, setErr] = useState(false);
            const [blocked, setBlocked] = useState(false);

            const [tab, setTab] = useState('dashboard');
            
            const [themeColor, setThemeColor] = useSafeStorage('pc_theme', '#1e3a8a');
            const [header, setHeader] = useSafeStorage('pc_header', { local: 'CT', time: '09:00', dur: '90' });
            const [teamName, setTeamName] = useSafeStorage('pc_team_name', 'MINHA EQUIPE');
            const [teamLogo, setTeamLogo] = useSafeStorage('pc_team_logo_url', null);
            const [coachName, setCoachName] = useSafeStorage('pc_coach_name', 'Treinador'); 
            const [teamCategory, setTeamCategory] = useSafeStorage('pc_team_category', 'Profissional'); 
            const [isDarkMode, setIsDarkMode] = useSafeStorage('pc_dark_mode', false); 
            
            const [playersRaw, setPlayers] = useSafeStorage('pc_players', [{name: "Jogador 1", age: '20', pos: 'Zagueiro', injured: false, suspended: false}]);
            const [sessionHistory, setSessionHistory] = useSafeStorage('pc_history_v2', {});
            const [scoutingData, setScoutingData] = useSafeStorage('pc_scouting', {});
            const [scoutingHistoryRaw, setScoutingHistory] = useSafeStorage('pc_scouting_history', []);
            const [matchData, setMatchData] = useSafeStorage('pc_match_report', {});
            const [matchHistoryRaw, setMatchHistory] = useSafeStorage('pc_match_history', []);
            const [sessionDate, setSessionDate] = useState(new Date().toISOString().split('T')[0]);
            const [sessionDrills, setSessionDrills] = useState([]);
            const [libraryDrillsRaw, setLibraryDrills] = useSafeStorage('pc_library', [{ libId: 1, name: 'Rondo 4x1', method: 'Treino Tático', dim: '10x10', time: '15', desc: 'Manutenção da posse.', variants: '', image: null }]);
            const [microData, setMicroData] = useSafeStorage('pc_micro_v7', {});
            const [calendarData, setCalendarData] = useSafeStorage('pc_calendar_v7', {});
            const [showSettings, setShowSettings] = useState(false);
            const [boardWeekDate, setBoardWeekDate] = useState(new Date()); 
            const [boardHistory, setBoardHistory] = useSafeStorage('pc_board_history_final', {}); 
            const [noticesRaw, setNotices] = useSafeStorage('pc_notices_list', []);
            const [seasonStats, setSeasonStats] = useSafeStorage('pc_season_stats_v2', { league: { p:0, w:0, d:0, l:0, gf:0, ga:0 }, cup: { p:0, w:0, d:0, l:0, gf:0, ga:0 }, friendly: { p:0, w:0, d:0, l:0, gf:0, ga:0 } }); 
            const [showStatsModal, setShowStatsModal] = useState(false);

            const players = safeArr(playersRaw);
            const notices = safeArr(noticesRaw);
            const scoutingHistory = safeArr(scoutingHistoryRaw);
            const matchHistory = safeArr(matchHistoryRaw);
            const libraryDrills = safeArr(libraryDrillsRaw);

            useEffect(() => {
                if (isDarkMode) document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }, [isDarkMode]);

            const checkAndSet = (cloudVal, localVal, setter) => {
                if (cloudVal !== undefined && JSON.stringify(cloudVal) !== JSON.stringify(localVal)) { setter(cloudVal); }
            };

            useEffect(() => {
                if(!auth) return;
                const authKey = localStorage.getItem('pc_auth_key');
                if(!authKey) return;
                activeDocRef = db.ref('procoach_app/clientes/' + authKey);

                const unsub = activeDocRef.on('value', (snap) => {
                    if (snap.exists()) {
                        const data = snap.val();
                        if (data.bloqueado === true) { setBlocked(true); return; } else { setBlocked(false); }

                        isFetchingFromCloud = true; clearTimeout(saveTimeout);
                        
                        checkAndSet(data.pc_theme, globalData.pc_theme, setThemeColor);
                        checkAndSet(data.pc_header, globalData.pc_header, setHeader);
                        checkAndSet(data.pc_team_name, globalData.pc_team_name, setTeamName);
                        checkAndSet(data.pc_team_logo_url, globalData.pc_team_logo_url, setTeamLogo);
                        checkAndSet(data.pc_coach_name, globalData.pc_coach_name, setCoachName);
                        checkAndSet(data.pc_team_category, globalData.pc_team_category, setTeamCategory);
                        checkAndSet(data.pc_dark_mode, globalData.pc_dark_mode, setIsDarkMode);
                        checkAndSet(data.pc_players, globalData.pc_players, setPlayers);
                        checkAndSet(data.pc_history_v2, globalData.pc_history_v2, setSessionHistory);
                        checkAndSet(data.pc_scouting, globalData.pc_scouting, setScoutingData);
                        checkAndSet(data.pc_scouting_history, globalData.pc_scouting_history, setScoutingHistory);
                        checkAndSet(data.pc_match_report, globalData.pc_match_report, setMatchData);
                        checkAndSet(data.pc_match_history, globalData.pc_match_history, setMatchHistory);
                        checkAndSet(data.pc_library, globalData.pc_library, setLibraryDrills);
                        checkAndSet(data.pc_micro_v7, globalData.pc_micro_v7, setMicroData);
                        checkAndSet(data.pc_calendar_v7, globalData.pc_calendar_v7, setCalendarData);
                        checkAndSet(data.pc_board_history_final, globalData.pc_board_history_final, setBoardHistory);
                        checkAndSet(data.pc_notices_list, globalData.pc_notices_list, setNotices);
                        checkAndSet(data.pc_season_stats_v2, globalData.pc_season_stats_v2, setSeasonStats);

                        setTimeout(() => { isFetchingFromCloud = false; }, 1000);
                        const st = document.getElementById('nuvem-status');
                        if(st){ st.style.display='block'; st.style.backgroundColor='#3b82f6'; st.innerHTML='⬇️ Atualizado'; setTimeout(()=>st.style.display='none', 2000); }
                    } else {
                        isFetchingFromCloud = false; triggerCloudSave();
                    }
                });
                return () => activeDocRef.off('value', unsub);
            }, [auth]);

            const login = (e) => {
                e.preventDefault();
                if (email.includes('@') && pass.length >= 4) {
                    const safeKey = email.replace(/\./g, '_').replace(/@/g, '_at_');
                    localStorage.setItem('pc_auth_key', safeKey);
                    localStorage.setItem('pc_auth', 'true');
                    setAuth(true); setErr(false);
                    window.location.reload(); 
                } else { setErr(true); }
            };

            const handleAddToSession = (libItem) => { setSessionDrills(prev => [...prev, { ...libItem, id: Date.now() }]); };
            const getWeekKey = (d) => { const date = new Date(d); date.setHours(0,0,0,0); date.setDate(date.getDate() + 4 - (date.getDay() || 7)); const yearStart = new Date(date.getFullYear(), 0, 1); const weekNo = Math.ceil((((date - yearStart) / 86400000) + 1) / 7); return `${date.getFullYear()}-W${weekNo}`; };
            const currentWeekKey = getWeekKey(boardWeekDate);
            const currentWeekStart = getMonday(boardWeekDate);
            const currentBoardData = boardHistory[currentWeekKey] || {};
            const updateBoardData = (day, images) => { const newData = { ...currentBoardData, [day]: images }; setBoardHistory({ ...boardHistory, [currentWeekKey]: newData }); };
            const changeBoardWeek = (days) => { const newDate = new Date(boardWeekDate); newDate.setDate(newDate.getDate() + days); setBoardWeekDate(newDate); };
            const handleAddToBoardFromLibrary = (day, imgUrl) => { const currentImages = safeArr(currentBoardData[day]); updateBoardData(day, [...currentImages, imgUrl]); };

            if (blocked) {
                return (
                    <div className="login-bg">
                        <div className="login-card" style={{borderColor: '#ef4444'}}>
                            <Icon name="x" size={48} className="mx-auto mb-4 text-red-500"/>
                            <h1 className="text-2xl font-black text-slate-800 mb-2 uppercase">Acesso Suspenso</h1>
                            <p className="text-sm text-slate-500 mb-6">A licença deste software encontra-se pendente ou bloqueada. Entre em contato com o suporte.</p>
                            <button onClick={()=>{localStorage.clear(); window.location.reload();}} className="btn-danger">Sair da Conta</button>
                        </div>
                    </div>
                );
            }

            if (!auth) {
                return (
                    <div className="login-bg">
                        <div className="login-card">
                            <h1 className="login-title">Scout Intelligence</h1>
                            <div className="login-subtitle">Acesso Restrito - Cloud SaaS</div>
                            <form onSubmit={login}>
                                <input type="email" placeholder="E-mail de Acesso" className="login-input" value={email} onChange={e => setEmail(e.target.value)} required />
                                <input type="password" placeholder="Senha" className="login-input" value={pass} onChange={e => setPass(e.target.value)} required />
                                {err && <div className="text-red-500 text-xs font-bold mb-4">Dados inválidos. Verifique as informações.</div>}
                                <button type="submit" className="btn-primary shadow-lg">Entrar no Sistema</button>
                            </form>
                            <div className="mt-8 text-[10px] text-slate-400 uppercase tracking-widest">Tecnologia Padrão Ouro</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-full overflow-hidden transition-colors duration-300 bg-slate-100">
                    <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} themeColor={themeColor} setThemeColor={setThemeColor} teamLogo={teamLogo} setTeamLogo={setTeamLogo} teamName={teamName} setTeamName={setTeamName} coachName={coachName} setCoachName={setCoachName} teamCategory={teamCategory} setTeamCategory={setTeamCategory} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
                    <SeasonStatsModal show={showStatsModal} onClose={()=>setShowStatsModal(false)} stats={seasonStats} setStats={setSeasonStats} themeColor={themeColor} />
                    
                    <div className="bg-white border-b p-2 px-4 flex justify-between items-center shadow-sm shrink-0 h-14">
                        <div className="flex items-center gap-3">
                            {teamLogo && <img src={teamLogo} className="w-8 h-8 object-contain" />}
                            <div className="font-black text-lg italic text-slate-800"><span style={{color: themeColor==='#FFFFFF'?'#000':themeColor}}>{teamName}</span></div>
                        </div>
                        <div className="flex gap-2 items-center"> 
                            <button onClick={()=>window.print()} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print"><Icon name="printer"/></button>
                            <button onClick={()=>setShowSettings(true)} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print"><Icon name="settings"/></button>
                            <button onClick={()=>{localStorage.clear(); window.location.reload();}} className="text-[10px] font-bold text-slate-500 hover:text-red-500 bg-slate-100 px-3 py-1.5 rounded-lg shadow-sm uppercase ml-2">Sair</button>
                        </div>
                    </div>

                    <div className="flex bg-white border-b gap-1 overflow-x-auto shrink-0 px-2 py-1 shadow-sm" style={{scrollbarWidth:'none'}}>
                        <button onClick={()=>setTab('dashboard')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='dashboard'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="home" size={14}/> INÍCIO</button>
                        <button onClick={()=>setTab('squad')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='squad'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="users" size={14}/> PLANTEL</button>
                        <button onClick={()=>setTab('lineup')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='lineup'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="shirt" size={14}/> CAMPO</button>
                        <button onClick={()=>setTab('performance')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='performance'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="chart" size={14}/> PERFOR</button>
                        <button onClick={()=>setTab('scouting')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='scouting'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="eye" size={14}/> SCOUT</button>
                        <button onClick={()=>setTab('session')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='session'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="list" size={14}/> SESSÃO</button>
                        <button onClick={()=>setTab('postmatch')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='postmatch'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="whistle" size={14}/> PÓS</button>
                        <button onClick={()=>setTab('micro')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='micro'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="grid" size={14}/> MICRO</button>
                        <button onClick={()=>setTab('board')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='board'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="image" size={14}/> BOARD</button>
                        <button onClick={()=>setTab('calendar')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='calendar'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="calendar" size={14}/> CALEND</button>
                        <button onClick={()=>setTab('library')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center transition-all ${tab==='library'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon name="book" size={14}/> EXERC.</button>
                    </div>

                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'dashboard' && <DashboardView themeColor={themeColor} players={players} setTab={setTab} teamLogo={teamLogo} scoutingData={scoutingData} microData={microData} calendarData={calendarData} header={header} seasonStats={seasonStats} openStats={()=>setShowStatsModal(true)} notices={notices} setNotices={setNotices} teamName={teamName} teamCategory={teamCategory} coachName={coachName} />}
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} history={sessionHistory} />}
                        {tab === 'lineup' && <SmartLineupView players={players} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'performance' && <PerformanceView players={players} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'scouting' && <ScoutingView themeColor={themeColor} scoutingData={scoutingData} setScoutingData={setScoutingData} scoutingHistory={scoutingHistory} setScoutingHistory={setScoutingHistory} />}
                        {tab === 'session' && <SessionView drills={sessionDrills} setDrills={setSessionDrills} header={header} setHeader={setHeader} logo={teamLogo} themeColor={themeColor} players={players} history={sessionHistory} setHistory={setSessionHistory} sessionDate={sessionDate} setSessionDate={setSessionDate} teamName={teamName} />}
                        {tab === 'postmatch' && <PostMatchView themeColor={themeColor} matchData={matchData} setMatchData={setMatchData} players={players} setPlayers={setPlayers} matchHistory={matchHistory} setMatchHistory={setMatchHistory} teamLogo={teamLogo} />}
                        {tab === 'micro' && <MicrocycleView micro={microData} setMicro={setMicroData} themeColor={themeColor} calendar={calendarData} />}
                        {tab === 'board' && <VisualBoardView currentWeekStart={currentWeekStart} changeWeek={changeBoardWeek} boardData={boardHistory[currentWeekKey] || {}} updateBoardData={updateBoardData} themeColor={themeColor} />}
                        {tab === 'calendar' && <CalendarView calendar={calendarData} setCalendar={setCalendarData} themeColor={themeColor} notices={notices} />}
                        {tab === 'library' && <LibraryView libraryDrills={libraryDrills} setLibraryDrills={setLibraryDrills} onAddToSession={handleAddToSession} onAddToBoard={handleAddToBoardFromLibrary} themeColor={themeColor} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
