    <style>

        .glass-input { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 2px 4px; color: white; outline: none; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; font-size: 11px; }
        .glass-input option { color: #333; background: white; }
        .print-card { @apply bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden; }
        .player-select-card { @apply flex flex-col items-center p-2 border rounded cursor-pointer transition-all hover:bg-slate-50 relative; }
        .player-select-card.selected { @apply bg-green-50 border-green-500 ring-1 ring-green-500; }
        .color-picker-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 2px #e2e8f0; }
        .color-picker-swatch.active { box-shadow: 0 0 0 2px #0f172a; }
        .grass-pattern { background-color: #15803d; background-image: repeating-linear-gradient(0deg, transparent, transparent 10%, rgba(255,255,255,0.1) 10%, rgba(255,255,255,0.1) 11%); }
        .micro-tag { @apply px-2 py-1.5 rounded text-[10px] font-bold text-white mb-1 cursor-pointer hover:opacity-90 transition-opacity text-center shadow-sm w-full block border border-white/20; }
        
        #loading { position: fixed; inset: 0; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 10px; }
        #nuvem-status { position: fixed; top: 0; left: 0; right: 0; background: #10b981; color: white; text-align: center; padding: 6px; font-size: 12px; font-weight: bold; z-index: 99999; display: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @media print { 
            .no-print { display: none !important; } 
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; } 
            .print-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; margin-bottom: 20px; }
            .page-break { page-break-inside: avoid; }
            #root { height: auto; overflow: visible; }
            ::-webkit-scrollbar { display: none; }
        }

</head>

        // --- SISTEMA DE SINCRONIZAÇÃO EM NUVEM (CLOUD SYNC) ---
        let globalData = {};

        let isFetchingFromCloud = true;

        function triggerCloudSave() {
            if (isFetchingFromCloud) return; 
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const dataToSave = { ...globalData };
                dataToSave.lastUpdated = firebase.firestore.FieldValue.serverTimestamp();
                
                docRef.set(dataToSave, { merge: true })
                    .then(() => {
                        const status = document.getElementById('nuvem-status');
                        if(status) {
                            status.style.display = 'block';
                            status.style.backgroundColor = '#10b981'; // Verde
                            status.innerHTML = '☁️ Salvo na Nuvem';
                            setTimeout(() => status.style.display = 'none', 2000);
                        }
                    })
                    .catch(e => console.error("Erro ao salvar na nuvem:", e));
            }, 1500); // Salva 1.5s após você parar de digitar
        }

        const useSafeStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    const val = item ? JSON.parse(item) : initialValue;
                    globalData[key] = val;
                    return val;
                } catch (error) { return initialValue; }
            });

            useEffect(() => {
                globalData[key] = storedValue;
                try { window.localStorage.setItem(key, JSON.stringify(storedValue)); } catch (error) {}
                triggerCloudSave();
            }, [key, storedValue]);

            return [storedValue, setStoredValue];
        };

            if(!sessions || sessions.length < 2) return <div className="h-32 flex items-center justify-center text-xs text-slate-400">Dados insuficientes.</div>;

            return (<svg viewBox={`0 0 ${w} ${h}`} className="w-full h-32 bg-slate-50 rounded border border-slate-100"><polyline points={pts} fill="none" stroke={color} strokeWidth="2" />{sessions.slice(-10).map((s, i, arr) => { const x = pad + (i / (arr.length - 1)) * (w - 2*pad); const y = h - pad - ((s.rating / 5) * (h - 2*pad)); return <circle key={i} cx={x} cy={y} r="3" fill={color} />; })}</svg>);

            return (

alue)}/></div><div><label className="font-bold text-slate-500">Vermelhos</label><input type="number" className="w-full border-b bg-transparent" value={player.stats?.rc||0} onChange={e=>onUpdateStat('rc',e.target.value)}/></div></div></div></div> </div> </div> );
        };

        // --- VIEWS ---
        const PerformanceView = ({ players, history, themeColor }) => {
            const [selectedPlayer, setSelectedPlayer] = useState(null); 
            const [viewMode, setViewMode] = useState('ranking'); 
            const processedData = useMemo(() => {
                const stats = {}; players.forEach((_, i) => { stats[i] = { total: 0, count: 0, sessions: [] }; });
                if(history) { Object.entries(history).forEach(([dateStr, data]) => { if(data.ratings) { Object.entries(data.ratings).forEach(([pIdx, rating]) => { if(stats[pIdx]) { stats[pIdx].total += rating; stats[pIdx].count += 1; stats[pIdx].sessions.push({ date: dateStr, rating }); } }); } }); }
                return Object.keys(stats).map(idx => { const s = stats[idx]; return { idx: parseInt(idx), name: players[idx]?.name || '?', image: players[idx]?.image, pos: players[idx]?.pos, avg: s.count > 0 ? (s.total / s.count).toFixed(1) : 0, count: s.count, sessions: s.sessions.sort((a,b) => new Date(a.date) - new Date(b.date)) }; }).sort((a,b) => b.avg - a.avg);
            }, [players, history]);
            
            const getRadarData = (p) => {

                const maxG = Math.max(...players.map(x=>x.stats?.g||0)) || 1; 
                const maxA = Math.max(...players.map(x=>x.stats?.a||0)) || 1; 
                const maxP = Math.max(...processedData.map(x=>x.count)) || 1; 
                return { g: (pl.stats?.g||0) / maxG, a: (pl.stats?.a||0) / maxA, p: p.count / maxP, r: (p.avg || 0) / 5 }; 
            };
            
            const groupedByPos = useMemo(() => { const groups = {}; positions.forEach(pos => groups[pos] = []); processedData.forEach(p => { if(groups[p.pos]) groups[p.pos].push(p); }); return groups; }, [processedData]);

                                            <h3 className="text-xs font-bold uppercase text-slate-500 mb-2">{pos}</h3>

                                        </div>
                                    ))}
                                </div>

ms-center gap-1"><span className={`font-bold ${s.rating>=4?'text-green-600':s.rating<3?'text-red-500':'text-yellow-600'}`}>{s.rating}</span><Icon name="star" size={10} className="text-slate-300"/></div></div>))}</div></div></div></> ) : (<div className="flex-1 flex flex-col items-center justify-center text-slate-300 p-8 text-center"><Icon name="chart" size={48} className="mb-2 opacity-50"/><span className="text-xs font-bold">Selecione um atleta.</span></div>)} 
                    </div> 
                </div> 
            ); 
        };

        const SquadView = ({ players, setPlayers, themeColor, history }) => { 
            const [viewProfile, setViewProfile] = useState(null); 
            const handleImageUrl = (idx) => { const url = prompt("Link da Imagem:"); if(url){ const n=[...players]; n[idx].image=url; setPlayers(n); } };

            const addP = () => setPlayers([...players, {name: "Novo Atleta", image: null, age: '', pos: 'Goleiro', height: '', weight: '', injured: false, suspended: false, stats: {h:'',g:0,a:0,yc:0,rc:0}, attributes: [], contractEnd: '', contractType: 'Definitivo'}]); 
            const updateName = (i, v) => { const n=[...players]; n[i].name=v; setPlayers(n); };

ht-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity no-print"><Icon name="trash" size={16}/></button> <div className="w-16 h-16 rounded-full bg-slate-100 overflow-hidden relative border-2 group/img mt-2" style={{borderColor: p.injured ? '#ef4444' : p.suspended ? '#eab308' : themeColor}}> {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center text-slate-300"><Icon name="users" size={32}/></div>} <div className="absolute inset-0 bg-black/60 flex items-center justify-center gap-2 opacity-0 group-hover/img:opacity-100 transition-opacity no-print" onClick={e=>e.stopPropagation()}><button onClick={()=>handleImageUrl(i)} className="text-white hover:text-blue-400"><Icon name="link" size={14}/></button></div> </div> <input className="text-center font-bold text-slate-700 bg-transparent border-b border-transparent focus:border-blue-300 outline-none w-full" value={p.name} onClick={e=>e.stopPropagation()} onChange={e=>updateName(i,e.target.value)} placeholder="Nome do Atleta"/> <div className="text-[10px] text-slate-500 font-bold uppercase mt-1 flex gap-2"><span>{p.pos || 'POS'}</span><span>|</span><span>{p.age ? `${p.age}a` : '-'}</span></div> </div> ))} <button onClick={addP} className="bg-white rounded-xl shadow border border-dashed border-slate-300 p-4 flex flex-col items-center justify-center gap-2 text-slate-400 hover:text-blue-500 hover:border-blue-500 transition-all cursor-pointer h-32 no-print"><Icon name="plus" size={32}/><span className="font-bold text-sm">Adicionar Atleta</span></button> </div> </div> ); };

        const DashboardView = ({ themeColor, players, setTab, teamLogo, scoutingData, microData, calendarData, header, seasonStats, openStats, notices, setNotices }) => { 
            const injured = players.filter(p => p.injured);

            const todayWeekDay = weekDaysMap[todayWeekDayIndex];
            const expiringContracts = players.filter(p => { if(!p.contractEnd) return false; const end = new Date(p.contractEnd); const now = new Date(); const diffTime = end - now; const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); return diffDays >= 0 && diffDays <= 90; });
            const calendarEvents = (calendarData[today] || []).map(ev => ({ ...ev, source: 'calendar' }));
            const microDay = microData[todayWeekDay] || {blocks:[]};

                        <button onClick={()=>setTab('dashboard')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='dashboard'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='dashboard'?themeColor:''}}><Icon name="home"/> INÍCIO</button>
                        <button onClick={()=>setTab('squad')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='squad'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='squad'?themeColor:''}}><Icon name="users"/> PLANTEL</button>
                        <button onClick={()=>setTab('lineup')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='lineup'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='lineup'?themeColor:''}}><Icon name="shirt"/> ESCALAÇÃO</button>
                        <button onClick={()=>setTab('performance')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='performance'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='performance'?themeColor:''}}><Icon name="chart"/> PERFORMANCE</button>
                        <button onClick={()=>setTab('scouting')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='scouting'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='scouting'?themeColor:''}}><Icon name="eye"/> SCOUTING</button>
                        <button onClick={()=>setTab('session')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='session'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='session'?themeColor:''}}><Icon name="list"/> SESSÃO</button>
                        <button onClick={()=>setTab('postmatch')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='postmatch'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='postmatch'?themeColor:''}}><Icon name="whistle"/> PÓS-JOGO</button>
                        <button onClick={()=>setTab('micro')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='micro'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='micro'?themeColor:''}}><Icon name="grid"/> MICRO</button>
                        <button onClick={()=>setTab('board')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='board'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='board'?themeColor:''}}><Icon name="image"/> BOARD</button> 
                        <button onClick={()=>setTab('calendar')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='calendar'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='calendar'?themeColor:''}}><Icon name="calendar"/> CALEND</button>
                        <button onClick={()=>setTab('library')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='library'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='library'?themeColor:''}}><Icon name="book"/> BIBLIOTECA</button>
                    </div>

                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'dashboard' && <DashboardView themeColor={themeColor} players={players} setTab={setTab} teamLogo={teamLogo} scoutingData={scoutingData} microData={microData} calendarData={calendarData} header={header} seasonStats={seasonStats} openStats={()=>setShowStatsModal(true)} noticeBoard={noticeBoard} setNoticeBoard={setNoticeBoard} notices={notices} setNotices={setNotices} />}
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} history={sessionHistory} />}
                        {tab === 'lineup' && <SmartLineupView players={players} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'performance' && <PerformanceView players={players} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'scouting' && <ScoutingView themeColor={themeColor} scoutingData={scoutingData} setScoutingData={setScoutingData} scoutingHistory={scoutingHistory} setScoutingHistory={setScoutingHistory} />}
                        {tab === 'session' && <SessionView drills={sessionDrills} setDrills={setSessionDrills} header={header} setHeader={setHeader} logo={teamLogo} themeColor={themeColor} players={players} history={sessionHistory} setHistory={setSessionHistory} sessionDate={sessionDate} setSessionDate={setSessionDate} teamName={teamName} />}
                        {tab === 'postmatch' && <PostMatchView themeColor={themeColor} matchData={matchData} setMatchData={setMatchData} players={players} setPlayers={setPlayers} matchHistory={matchHistory} setMatchHistory={setMatchHistory} teamLogo={teamLogo} />}
                        {tab === 'micro' && <MicrocycleView micro={microData} setMicro={setMicroData} themeColor={themeColor} calendar={calendarData} />}
                        {tab === 'board' && <VisualBoardView currentWeekStart={currentWeekStart} changeWeek={changeBoardWeek} boardData={currentBoardData} updateBoardData={updateBoardData} themeColor={themeColor} />}
                        {tab === 'calendar' && <CalendarView calendar={calendarData} setCalendar={setCalendarData} themeColor={themeColor} notices={notices} />}
                        {tab === 'library' && <LibraryView libraryDrills={libraryDrills} setLibraryDrills={setLibraryDrills} onAddToSession={handleAddToSession} onAddToBoard={handleAddToBoardFromLibrary} themeColor={themeColor} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
