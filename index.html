<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scout Intelligence - Pro SaaS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { overscroll-behavior-y: contain; touch-action: none; background-color: #f1f5f9; color: #0f172a; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        .glass-input { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 2px 4px; color: white; outline: none; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; font-size: 11px; }
        .print-card { background: white; border-radius: 0.75rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; overflow: hidden; position: relative; }
        .color-picker-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 2px #e2e8f0; }
        .color-picker-swatch.active { box-shadow: 0 0 0 2px #0f172a; }
        .grass-pattern { background-color: #15803d; background-image: repeating-linear-gradient(0deg, transparent, transparent 10%, rgba(255,255,255,0.1) 10%, rgba(255,255,255,0.1) 11%); }
        .micro-tag { padding: 4px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; display:flex; justify-content:space-between; margin-bottom: 4px;}
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        /* DARK MODE */
        body.dark-theme { background-color: #0f172a; color: #f8fafc; }
        .dark-theme .bg-white { background-color: #1e293b !important; border-color: #334155 !important; color: #f8fafc !important; }
        .dark-theme .bg-slate-50, .dark-theme .bg-slate-100 { background-color: #0f172a !important; border-color: #1e293b !important; color: #cbd5e1 !important; }
        .dark-theme .text-slate-800, .dark-theme .text-slate-700 { color: #f8fafc !important; }
        .dark-theme .text-slate-500, .dark-theme .text-slate-400 { color: #94a3b8 !important; }
        .dark-theme input, .dark-theme select, .dark-theme textarea { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
        .dark-theme .grass-pattern { background-color: #15803d !important; }
        .dark-theme .bg-green-50 { background-color: #064e3b !important; border-color: #047857 !important; color: #34d399 !important; }
        .dark-theme .bg-red-50 { background-color: #450a0a !important; border-color: #7f1d1d !important; color: #f87171 !important; }
        .dark-theme .bg-yellow-50 { background-color: #422006 !important; border-color: #78350f !important; color: #fbbf24 !important; }
        .dark-theme .bg-blue-50 { background-color: #172554 !important; border-color: #1e3a8a !important; color: #60a5fa !important; }
        
        /* LOGIN SAAS BRANCO */
        .login-bg { background-color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; position: fixed; z-index: 100000; left:0; top:0;}
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; margin: 15px;}
        .login-input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 15px; font-size: 14px; outline: none; background: #f8fafc; color: #334155;}
        .login-input:focus { border-color: #1e3a8a; box-shadow: 0 0 0 2px rgba(30,58,138,0.2); }
        .btn-primary { width: 100%; background: #1e3a8a; color: white; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; font-size: 14px;}
        .btn-primary:hover { background: #1e40af; }

        @media print { 
            .no-print { display: none !important; } 
            body { background: white; } 
            .print-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; margin-bottom: 20px; }
            #root { height: auto; overflow: visible; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, Component } = React;

        // 1. SISTEMA ANTI-TELA BRANCA
        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false, err: '' }; }
            static getDerivedStateFromError(error) { return { hasError: true, err: error.toString() }; }
            render() { 
                if(this.state.hasError) return (
                    <div className="p-8 text-center bg-red-50 h-screen flex flex-col items-center justify-center">
                        <h2 className="text-2xl font-bold text-red-700 mb-2">Ops! Ocorreu um erro no sistema.</h2>
                        <pre className="text-xs bg-red-100 p-4 rounded text-red-900 max-w-md overflow-auto mb-4">{this.state.err}</pre>
                        <button className="bg-red-600 text-white px-6 py-2 rounded font-bold shadow" onClick={()=>{localStorage.clear(); window.location.reload();}}>Resetar Aplicativo</button>
                    </div>
                ); 
                return this.props.children; 
            }
        }

        // 2. UTILIDADES BLINDADAS
        const safeArr = (x) => { if (!x) return []; let arr = Array.isArray(x) ? x : Object.values(x); return arr.map(item => item || {}); };
        const safeObj = (x) => x ? x : {};
        const safeStr = (x) => x ? String(x) : "";
        const fDate = (d) => { if(!d) return '-'; const p = d.split('-'); return p.length<3 ? d : `${p[2]}/${p[1]}`; };
        const getMonday = (d) => { let date = new Date(d); let day = date.getDay(), diff = date.getDate() - day + (day === 0 ? -6 : 1); return new Date(date.setDate(diff)); };
        const isExpiringSoon = (d) => { if(!d) return false; const end = new Date(d); return !isNaN(end) && Math.ceil((end - new Date()) / 86400000) >= 0 && Math.ceil((end - new Date()) / 86400000) <= 90; };

        // 3. FIREBASE CONFIG
        firebase.initializeApp({
            apiKey: "AIzaSyAOYj9PajWfITTANzrxhtDYxQOmIOv4raw",
            authDomain: "meu-app-novo-c34ad.firebaseapp.com",
            databaseURL: "https://meu-app-novo-c34ad-default-rtdb.firebaseio.com",
            projectId: "meu-app-novo-c34ad",
            storageBucket: "meu-app-novo-c34ad.firebasestorage.app"
        });
        const db = firebase.database();
        let globalData = {}; let saveTimeout = null; let isFetching = true; let activeDocRef = null;

        function triggerSave() {
            if (isFetching || !activeDocRef) return; 
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                if(navigator.onLine) {
                    activeDocRef.update({ ...globalData, lastUpdated: firebase.database.ServerValue.TIMESTAMP }).catch(e => console.log(e));
                }
            }, 1500); 
        }

        const useSafeStorage = (key, initVal) => {
            const [val, setVal] = useState(() => {
                try { const item = localStorage.getItem(key); const v = item ? JSON.parse(item) : initVal; globalData[key]=v; return v; } catch(e){return initVal;}
            });
            useEffect(() => { globalData[key] = val; try{localStorage.setItem(key, JSON.stringify(val));}catch(e){} triggerSave(); }, [key, val]);
            return [val, setVal];
        };

        // 4. CONSTANTES E ÍCONES
        const positions = ["Goleiro", "Zagueiro", "Lat. Dir.", "Lat. Esq.", "Volante", "Meia", "Extremo", "Atacante"];
        const activityOptions = ["Aquecimento", "Tático", "Técnico", "Físico", "Coletivo", "Bola Parada", "Recuperação", "Mini Jogo"];
        const tacticalSystems = ["4-3-3", "4-4-2", "4-2-3-1", "3-5-2", "3-4-3", "5-3-2", "4-1-4-1"];
        const timeOptions = Array.from({length: 26}, (_, i) => (i + 1) * 5);
        const PREDEFINED_TAGS = [{ label: 'JOGO', color: 'bg-red-600' }, { label: 'TREINO', color: 'bg-green-600' }, { label: 'RECUPERAÇÃO', color: 'bg-blue-500' }, { label: 'ACADEMIA', color: 'bg-yellow-500' }];
        const TACTICAL_TAGS = [{ label: 'ORG. OF', color: 'bg-emerald-500' }, { label: 'ORG. DF', color: 'bg-rose-500' }, { label: 'TRANS. OF', color: 'bg-cyan-600' }, { label: 'TRANS. DF', color: 'bg-orange-600' }];
        const themeColors = ['#1e3a8a', '#0f766e', '#b91c1c', '#a16207', '#4c1d95', '#be185d', '#111827', '#FFFFFF'];

        const Icon = ({ n, size=18, cls="" }) => {
            const s = {
                home: <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>,
                users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                shirt: <path d="M20.38 3.4a1.6 1.6 0 0 0-1.6-1.6H5.22a1.6 1.6 0 0 0-1.6 1.6l-1.6 6.3a1.6 1.6 0 0 0 1.2 1.9l2.78.6v9.1a1.6 1.6 0 0 0 1.6 1.6h8.8a1.6 1.6 0 0 0 1.6-1.6v-9.1l2.78-.6a1.6 1.6 0 0 0 1.2-1.9l-1.6-6.3z"/>,
                chart: <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
                eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
                list: <><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>,
                whistle: <><path d="M3 21l18 0"/><path d="M3 10a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2z"/><path d="M8 8v-3a3 3 0 0 1 6 0v3"/></>,
                grid: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
                image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                book: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>,
                settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                printer: <><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                link: <><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></>,
                arrowUp: <><polyline points="12 19 12 5"/><polyline points="5 12 12 5 19 12"/></>,
                arrowDown: <><polyline points="12 5 12 19"/><polyline points="19 12 12 19 5 12"/></>,
                arrowRight: <><polyline points="5 12 19 12"/><polyline points="12 5 19 12 12 19"/></>,
                hourglass: <path d="M21 4H3M21 20H3M16 20v-5a4 4 0 0 0-4-4 4 4 0 0 0-4 4v5M16 4v5a4 4 0 0 1-4 4 4 4 0 0 1-4-4V4"/>,
                medkit: <><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                trophy: <><path d="M8 21h8m-4-9v9"/><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/><path d="M7 2v16"/><path d="M17 2v16"/></>,
                sun: <><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/></>,
                moon: <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill={n==='star'?'currentColor':'none'} stroke={n==='star'?'none':'currentColor'} strokeWidth="2" className={cls}>{s[n]}</svg>;
        };

        const StarRating = ({ value, onChange }) => ( <div className="flex gap-1">{[1,2,3,4,5].map(s => <button key={s} onClick={()=>onChange(s)} className={`star-rating ${s<=value?'text-yellow-400':'text-slate-300'}`}><Icon n="star" size={14}/></button>)}</div> );
        
        // --- COMPONENTES FM ---
        const OscillationChart = ({ sessions, color }) => {
            if(!sessions || sessions.length < 2) return <div className="h-32 flex items-center justify-center text-xs text-slate-400">Dados insuficientes.</div>;
            const h = 100, w = 250, pad = 20; 
            const pts = sessions.slice(-10).map((s, i, arr) => `${pad + (i / (arr.length - 1)) * (w - 2*pad)},${h - pad - ((s.rating / 5) * (h - 2*pad))}`).join(' ');
            return ( <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-32 bg-slate-50 rounded border border-slate-100"><polyline points={pts} fill="none" stroke={color} strokeWidth="2" />{sessions.slice(-10).map((s, i, arr) => <circle key={i} cx={pad + (i / (arr.length - 1)) * (w - 2*pad)} cy={h - pad - ((s.rating / 5) * (h - 2*pad))} r="3" fill={color} /> )}</svg>);
        };

        const PositionalBarChart = ({ players, color }) => {
            if(!players || players.length === 0) return null;
            return (
                <div className="flex items-end justify-around h-32 gap-2 border-b border-slate-200 p-2">
                    {players.map((p, i) => (
                        <div key={i} className="flex flex-col items-center flex-1">
                            <div className="text-[10px] font-bold mb-1">{p.avg}</div>
                            <div className="w-full bg-slate-200 rounded-t-sm relative group"><div className="absolute bottom-0 left-0 right-0 rounded-t-sm transition-all" style={{height: `${(p.avg / 5) * 100}%`, backgroundColor: color}}></div></div>
                            <div className="text-[8px] font-bold text-slate-500 mt-1 truncate w-12 text-center">{p.name}</div>
                        </div>
                    ))}
                </div>
            );
        };

        const VerticalPitch = ({ size }) => {
            return ( <div className="w-full h-32 rounded border border-slate-300 relative overflow-hidden flex items-center justify-center grass-pattern shadow-inner group"><svg className="absolute inset-0 w-full h-full p-2 opacity-80" viewBox="0 0 100 140" fill="none" stroke="white" strokeWidth="1.5"><rect x="5" y="5" width="90" height="130" /><line x1="5" y1="70" x2="95" y2="70" /><circle cx="50" cy="70" r="12" /><rect x="25" y="5" width="50" height="20" /><rect x="38" y="5" width="24" height="8" /><path d="M 40 25 Q 50 32 60 25" strokeLinecap="round" /><path d="M 5 10 Q 10 5 10 5" /><path d="M 90 5 Q 90 10 95 10" /><rect x="25" y="115" width="50" height="20" /><rect x="38" y="127" width="24" height="8" /><path d="M 40 115 Q 50 108 60 115" strokeLinecap="round" /><path d="M 5 130 Q 10 135 10 135" /><path d="M 95 130 Q 90 135 90 135" /></svg>{size === 'Pequeno' && <div className="absolute inset-0 flex items-center justify-center"><div className="w-[40%] h-[30%] bg-yellow-400/50 border-2 border-yellow-300 rounded shadow-[0_0_20px_rgba(250,204,21,0.6)] animate-pulse z-10 mix-blend-overlay"></div></div>}{size === 'Médio' && <div className="absolute inset-0 flex items-center justify-center"><div className="w-[90%] h-[50%] bg-yellow-400/40 border-2 border-yellow-300 shadow-[0_0_20px_rgba(250,204,21,0.5)] animate-pulse z-10 mix-blend-overlay"></div></div>}{size === 'Grande' && <div className="absolute inset-0 bg-yellow-400/30 border-4 border-yellow-300 animate-pulse z-10 mix-blend-overlay"></div>}{!size && <div className="absolute inset-0 bg-black/20 flex items-center justify-center z-20"><span className="text-[9px] text-white font-bold bg-black/50 px-2 rounded backdrop-blur-sm">DEFINIR ESPAÇO</span></div>}</div> );
        };

        const RadarChart = ({ data, size = 120, color = "#3b82f6" }) => {
            const scale = size / 2.5; const center = size / 2; 
            const values = [data.r||0, data.g||0, data.p||0, data.a||0]; 
            const points = values.map((val, i) => { const angle = (Math.PI / 2) * i - Math.PI / 2; return [center + Math.cos(angle) * (val * scale), center + Math.sin(angle) * (val * scale)]; });
            return (<div className="relative flex items-center justify-center"><svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="overflow-visible"><circle cx={center} cy={center} r={scale} fill="none" stroke="#e2e8f0" strokeWidth="1" strokeDasharray="2,2"/><line x1={center} y1={center - scale} x2={center} y2={center + scale} stroke="#cbd5e1" strokeWidth="1" /><line x1={center - scale} y1={center} x2={center + scale} y2={center} stroke="#cbd5e1" strokeWidth="1" /><polygon points={points.map(p => p.join(',')).join(' ')} fill={color} fillOpacity="0.3" stroke={color} strokeWidth="2" /><text x={center} y={center - scale - 10} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#64748b">NOTA</text><text x={center + scale + 10} y={center + 3} textAnchor="start" fontSize="9" fontWeight="bold" fill="#64748b">GOLS</text><text x={center} y={center + scale + 12} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#64748b">PRES</text><text x={center - scale - 10} y={center + 3} textAnchor="end" fontSize="9" fontWeight="bold" fill="#64748b">AST</text></svg></div>);
        };

        // --- MODALS (Configuração e Perfil) ---
        const SettingsModal = ({ show, onClose, themeColor, setThemeColor, teamLogo, setTeamLogo, teamName, setTeamName, coachName, setCoachName, teamCategory, setTeamCategory, isDarkMode, setIsDarkMode }) => {
            if (!show) return null;
            return ( 
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print" onClick={onClose}> 
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden" onClick={e=>e.stopPropagation()}> 
                        <div className="p-4 text-white flex justify-between items-center" style={{backgroundColor: themeColor === '#FFFFFF' ? '#0f172a' : themeColor}}> 
                            <h3 className="font-bold flex items-center gap-2 text-sm"><Icon n="settings"/> CONFIGURAÇÕES</h3> 
                            <button onClick={onClose}><Icon n="x"/></button> 
                        </div> 
                        <div className="p-6 max-h-[80vh] overflow-y-auto"> 
                            <h4 className="font-bold text-slate-700 mb-3 text-sm uppercase">Dados da Equipe</h4> 
                            <div className="space-y-3 mb-6">
                                <div><label className="text-[10px] font-bold text-slate-400">NOME DO TIME</label><input className="w-full border rounded p-2 text-xs font-bold" value={teamName||''} onChange={e=>setTeamName(e.target.value)} /></div>
                                <div><label className="text-[10px] font-bold text-slate-400">CATEGORIA</label><input className="w-full border rounded p-2 text-xs" value={teamCategory||''} onChange={e=>setTeamCategory(e.target.value)} /></div>

{s.gf||0} onChange={e=>updateStat(type, 'gf', e.target.value)}/></td><td className="p-1"><input type="number" className="w-10 text-center border rounded" value={s.ga||0} onChange={e=>updateStat(type, 'ga', e.target.value)}/></td><td className={`p-1 font-bold ${sg > 0 ? 'text-green-600' : sg < 0 ? 'text-red-600' : 'text-gray-400'}`}>{sg}</td><td className="p-1 font-black">{pct}%</td></tr> ) })}<tr className="bg-slate-50 font-black text-slate-800 border-t-2 border-slate-200"><td className="p-3 text-left">TOTAL</td><td>{totals.p}</td><td className="text-green-600">{totals.w}</td><td className="text-gray-600">{totals.d}</td><td className="text-red-600">{totals.l}</td><td>{totals.gf}</td><td>{totals.ga}</td><td>{(totals.gf - totals.ga)}</td><td className={`${totalPct > 60 ? 'text-green-600' : totalPct < 40 ? 'text-red-600' : 'text-blue-600'}`}>{totalPct}%</td></tr></tbody></table></div> </div> </div> );

                const onOffline = () => setIsOnline(false);
                window.addEventListener('online', onOnline);
                window.addEventListener('offline', onOffline);
                return () => { window.removeEventListener('online', onOnline); window.removeEventListener('offline', onOffline); };
            }, []);

            useEffect(() => {
                if (isDarkMode) document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }, [isDarkMode]);

            useEffect(() => {
                if(!auth) return;
                const authKey = localStorage.getItem('pc_auth_key');
                if(!authKey) return;
                activeDocRef = db.ref('procoach_app/clientes/' + authKey);

                const unsub = activeDocRef.on('value', (snap) => {
                    if (snap.exists()) {
                        const data = snap.val();
                        if (data.bloqueado === true) { setBlocked(true); return; } else { setBlocked(false); }

                        isFetching = true; clearTimeout(saveTimeout);
                        const chk = (c, l, s) => { if(c!==undefined && JSON.stringify(c)!==JSON.stringify(l)) s(c); };
                        
                        chk(data.pc_theme, globalData.pc_theme, setThemeColor);
                        chk(data.pc_team_name, globalData.pc_team_name, setTeamName);
                        chk(data.pc_team_logo_url, globalData.pc_team_logo_url, setTeamLogo);
                        chk(data.pc_coach_name, globalData.pc_coach_name, setCoachName);
                        chk(data.pc_team_category, globalData.pc_team_category, setTeamCategory);
                        chk(data.pc_dark_mode, globalData.pc_dark_mode, setIsDarkMode);
                        chk(data.pc_players, globalData.pc_players, setPlayers);
                        chk(data.pc_history_v2, globalData.pc_history_v2, setSessionHistory);
                        chk(data.pc_scouting, globalData.pc_scouting, setScoutingData);
                        chk(data.pc_micro_v7, globalData.pc_micro_v7, setMicroData);
                        chk(data.pc_calendar_v7, globalData.pc_calendar_v7, setCalendarData);
                        chk(data.pc_notices_list, globalData.pc_notices_list, setNotices);
                        chk(data.pc_season_stats_v2, globalData.pc_season_stats_v2, setSeasonStats);
                        chk(data.pc_match_report, globalData.pc_match_report, setMatchData);
                        chk(data.pc_library, globalData.pc_library, setLibraryDrills);
                        chk(data.pc_board_history_final, globalData.pc_board_history_final, setBoardHistory);

                        setTimeout(() => { isFetching = false; }, 1000);
                        const st = document.getElementById('nuvem-status');
                        if(st){ st.style.display='block'; st.style.backgroundColor='#3b82f6'; st.innerHTML='⬇️ Atualizado'; setTimeout(()=>st.style.display='none', 2000); }
                    } else {
                        isFetching = false; triggerSave();
                    }
                });
                return () => activeDocRef.off('value', unsub);
            }, [auth]);

            const login = (e) => {
                e.preventDefault();
                if (email.includes('@') && pass.length >= 4) {
                    const safeKey = email.replace(/\./g, '_').replace(/@/g, '_at_');
                    localStorage.setItem('pc_auth_key', safeKey);
                    localStorage.setItem('pc_auth', 'true');
                    setAuth(true); setErr(false);
                    window.location.reload(); 
                } else { setErr(true); }
            };

            const [showSettings, setShowSettings] = useState(false);
            const [showStatsModal, setShowStatsModal] = useState(false);

            if (blocked) {
                return (
                    <div className="login-bg">
                        <div className="login-card" style={{borderColor: '#ef4444'}}>
                            <Icon n="x" size={48} cls="mx-auto mb-4 text-red-500"/>
                            <h1 className="text-2xl font-black text-slate-800 mb-2 uppercase">Acesso Suspenso</h1>
                            <p className="text-sm text-slate-500 mb-6">A licença deste software encontra-se pendente ou bloqueada. Entre em contato com o suporte.</p>
                            <button onClick={()=>{localStorage.clear(); window.location.reload();}} className="btn-primary" style={{background: '#ef4444'}}>Sair da Conta</button>
                        </div>
                    </div>
                );
            }

            if (!auth) {
                return (
                    <div className="login-bg">
                        <div className="login-card">
                            <h1 className="login-title">Scout Intelligence</h1>
                            <div className="login-subtitle">Acesso Restrito - Cloud SaaS</div>
                            <form onSubmit={login}>
                                <input type="email" placeholder="E-mail de Acesso" className="login-input" value={email} onChange={e => setEmail(e.target.value)} required />
                                <input type="password" placeholder="Senha" className="login-input" value={pass} onChange={e => setPass(e.target.value)} required />
                                {err && <div className="text-red-500 text-xs font-bold mb-4">Dados inválidos. Verifique as informações.</div>}
                                <button type="submit" className="btn-primary shadow-lg">Entrar no Sistema</button>
                            </form>
                            <div className="mt-8 text-[10px] text-slate-400 uppercase tracking-widest">Tecnologia Padrão Ouro</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-full overflow-hidden transition-colors duration-300 bg-slate-100 relative">
                    <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} themeColor={themeColor} setThemeColor={setThemeColor} teamLogo={teamLogo} setTeamLogo={setTeamLogo} teamName={teamName} setTeamName={setTeamName} coachName={coachName} setCoachName={setCoachName} teamCategory={teamCategory} setTeamCategory={setTeamCategory} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
                    <SeasonStatsModal show={showStatsModal} onClose={()=>setShowStatsModal(false)} stats={seasonStats} setStats={setSeasonStats} themeColor={themeColor} />
                    
                    {/* BARRA DE TOPO COM INDICADOR ONLINE/OFFLINE */}
                    <div className="bg-white border-b p-2 px-4 flex justify-between items-center shadow-sm z-30 shrink-0 h-14">
                        <div className="flex items-center gap-3">
                            {teamLogo && <img src={teamLogo} className="w-8 h-8 object-contain" />}
                            <div className="font-black text-lg italic text-slate-800 tracking-tight">
                                <span style={{color: themeColor === '#FFFFFF' ? '#000000' : themeColor}}>{teamName}</span> 
                            </div>
                        </div>
                        <div className="flex gap-2 items-center"> 
                            <div className={`px-2 py-1 rounded-lg text-[9px] font-black text-white flex items-center gap-1 shadow-sm ${isOnline ? 'bg-green-500' : 'bg-red-500'}`}>
                                <div className={`w-2 h-2 bg-white rounded-full ${isOnline ? 'animate-pulse' : ''}`}></div>
                                {isOnline ? 'ONLINE' : 'OFFLINE'}
                            </div>
                            <button onClick={()=>window.print()} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print"><Icon n="printer"/></button>
                            <button onClick={()=>setShowSettings(true)} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print"><Icon n="settings"/></button>
                            <button onClick={()=>{localStorage.removeItem('pc_auth'); window.location.reload();}} className="text-[10px] font-bold text-slate-500 hover:text-red-500 bg-slate-100 px-3 py-1.5 rounded-lg no-print shadow-sm uppercase ml-2">Sair</button>
                        </div>
                    </div>

                    {/* AS 11 ABAS RESTAURADAS */}
                    <div className="flex bg-white border-b gap-1 overflow-x-auto no-print shrink-0 px-2 py-1 shadow-sm" style={{scrollbarWidth:'none'}}>
                        <button onClick={()=>setTab('dashboard')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='dashboard'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="home" size={14}/> INÍCIO</button>
                        <button onClick={()=>setTab('squad')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='squad'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="users" size={14}/> PLANTEL</button>
                        <button onClick={()=>setTab('lineup')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='lineup'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="shirt" size={14}/> ESCALAÇÃO</button>
                        <button onClick={()=>setTab('performance')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='performance'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="chart" size={14}/> PERFOR</button>
                        <button onClick={()=>setTab('scouting')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='scouting'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="eye" size={14}/> SCOUT</button>
                        <button onClick={()=>setTab('session')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='session'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="list" size={14}/> SESSÃO</button>
                        <button onClick={()=>setTab('postmatch')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='postmatch'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="whistle" size={14}/> PÓS-JOGO</button>
                        <button onClick={()=>setTab('micro')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='micro'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="grid" size={14}/> MICRO</button>
                        <button onClick={()=>setTab('board')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='board'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="image" size={14}/> BOARD</button>
                        <button onClick={()=>setTab('calendar')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='calendar'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="calendar" size={14}/> CALEND</button>
                        <button onClick={()=>setTab('library')} className={`px-4 py-2 rounded-lg text-[10px] uppercase font-bold shrink-0 flex flex-col items-center gap-1 transition-all ${tab==='library'?'bg-slate-100 text-blue-600 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><Icon n="book" size={14}/> BIBLIOTECA</button>
                    </div>

                    <div className="flex-1 overflow-hidden relative mt-2">
                        {tab === 'dashboard' && <DashboardView themeColor={themeColor} players={playersRaw} setTab={setTab} teamLogo={teamLogo} scoutingData={scoutingData} microData={microData} calendarData={calendarData} seasonStats={seasonStats} openStats={()=>setShowStatsModal(true)} notices={notices} setNotices={setNotices} teamName={teamName} teamCategory={teamCategory} coachName={coachName} />}
                        {tab === 'squad' && <SquadView players={playersRaw} setPlayers={setPlayers} themeColor={themeColor} history={sessionHistory} />}
                        {tab === 'lineup' && <SmartLineupView players={playersRaw} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'performance' && <PerformanceView players={playersRaw} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'scouting' && <ScoutingView themeColor={themeColor} scoutingData={scoutingData} setScoutingData={setScoutingData} />}
                        {tab === 'session' && <SessionView drills={sessionDrills} setDrills={setSessionDrills} players={playersRaw} history={sessionHistory} setHistory={setSessionHistory} themeColor={themeColor} />}
                        {tab === 'postmatch' && <PostMatchView matchData={matchData} setMatchData={setMatchData} players={playersRaw} />}
                        {tab === 'micro' && <MicrocycleView microData={microData} setMicroData={setMicroData} themeColor={themeColor} />}
                        {tab === 'board' && <VisualBoardView boardHistory={boardHistory} setBoardHistory={setBoardHistory} />}
                        {tab === 'calendar' && <CalendarView calendarData={calendarData} setCalendarData={setCalendarData} />}
                        {tab === 'library' && <LibraryView libraryDrills={libraryDrills} setLibraryDrills={setLibraryDrills} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
